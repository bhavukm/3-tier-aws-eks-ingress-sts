eksctl create cluster -f cluster.yaml
eksctl utils associate-iam-oidc-provider --region=us-east-1 --cluster=eksapp --approve
eksctl create addon --name aws-ebs-csi-driver --cluster eksapp --region us-east-1 --service-account-role-arn "" --force
curl -o iam_policy.json https://raw.githubusercontent.com/kubernetes-sigs/aws-load-balancer-controller/main/docs/install/iam_policy.json
aws iam create-policy --policy-name AWSLoadBalancerControllerIAMPolicy --policy-document file://iam_policy.json
eksctl create iamserviceaccount --cluster eksapp --namespace kube-system --name aws-load-balancer-controller --attach-policy-arn arn:aws:iam::<ACCOUNT_ID>:policy/AWSLoadBalancerControllerIAMPolicy --approve
helm repo add eks https://aws.github.io/eks-charts
helm repo update
helm install aws-load-balancer-controller eks/aws-load-balancer-controller -n kube-system --set clusterName=eksapp --set serviceAccount.create=false --set serviceAccount.name=aws-load-balancer-controller
kubectl get pods -n kube-system
kubectl create namespace demo-app
kubectl apply -f secret.yaml
kubectl apply -f configmap.yaml
kubectl apply -f postgres-statefulset.yaml
kubectl apply -f postgres-service.yaml
kubectl apply -f backend2.yaml
kubectl apply -f backend-service2.yaml
kubectl apply -f frontend.yaml
kubectl apply -f frontend-service.yaml
kubectl apply -f ingress.yaml
kubectl get all -n demo-app
On the browser, access the application using the ALB DNS name obtained from the ingress resource:
http://<ALB_DNS_NAME>/insert
http://<ALB_DNS_NAME>/data
http://<ALB_DNS_NAME>/
kubectl get ingress demo-ingress -n demo-app

