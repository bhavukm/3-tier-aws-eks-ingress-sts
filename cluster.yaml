apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: eksapp
  region: us-east-1
  version: "1.35"

iam:
  withOIDC: true

vpc:
  id: vpc-0a4a79a55fd7e78f7
  clusterEndpoints:
    publicAccess: true
    privateAccess: false
  subnets:
    public:
      us-east-1a:
        id: subnet-054ab7dc048227dd4
      us-east-1b:
        id: subnet-06af550497345a1ff

managedNodeGroups:
  - name: eksapp-ng
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 1
    maxSize: 4
    privateNetworking: false
    ssh:
      allow: true
      publicKeyName: ssh
    iam:
      withAddonPolicies:
        awsLoadBalancerController: true
        ebs: true
        cloudWatch: true